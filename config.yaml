# General
targets: "targets/tcp/80/2025-05-20_21-51-29" # Use e.g. "targets/tcp/80/<timestamp>" or just "latest" to automatically get your most recent target file for your config
protocol: "tcp" # TODO Use a list like ["icmp", "tcp"] to enable inter-protocol measurements
record_traffic: false

# TCP
tcp_dst_port: 80
tcp_request_flags: "S" # S=SYN A=ACK R=RST, e.g. "SA" for SYN-ACK
tcp_src_port_offset: 22570

# UDP
udp_dst_port: 53
udp_src_port_offset: 32570

# B2B Probing
b2b_request_count: 10 # <= 16
b2b_request_interval: "10ms"
b2b_retry_count: 0

# SEQ Probing
seq_request_count: 10 # <= 16
seq_retry_count: 0

# Probing
iface_a:
  name: "eth0"
  ip: "141.76.94.12"
iface_b:
  name: "eth1"
  ip: "141.76.94.15"
max_rtt: "2s"
default_send_ip_ids: [0] # Sends [0,0,0,...]
detect_reflected_ip_ids: false
reflection_send_ip_ids: [3717,3718,3719] # Sequence must not match with any known pattern

# Hitlist
zmap_bandwidth: "30M" # Bandwidth for zmap scans

# Dataframe column names # TODO Use Dataframe column names as reference in other scripts
ip_col_name: "IP"
ts_ip_col_name: "TS_IP"
us_ip_col_name: "US_IP"
os_col_name: "OS"
ts_os_col_name: "TS_OS"
us_os_col_name: "US_OS"

ip_id_seq_col_name: "IP_ID_SEQUENCE"
sent_ts_seq_col_name: "SENT_TS_SEQUENCE"
received_ts_seq_col_name: "RECEIVED_TS_SEQUENCE"

ip_id_pattern_col_name: "IP_ID_PATTERN"
avg_rtt_col_name: "AVG_RTT"
std_rtt_col_name: "STD_RTT"
asn_col_name: "ASN"
